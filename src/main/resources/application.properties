spring.application.name=forohub

spring.datasource.url=jdbc:mysql://${ALURA_DB_HOST}/forohub
spring.datasource.username=${ALURA_DB_USER}
spring.datasource.password=${ALURA_DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.format-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# logging.level.root=DEBUG

server.error.include-stacktrace=never
forohub.security.token.secret=${JWT_SECRET:12345678}
forohub.security.token.expiration=${JWT_EXPIRATION:2}
forohub.security.token.issuer=${JWT_ISSUER:Foro Hub ONE}
